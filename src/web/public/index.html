<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TIQ World AI Agent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --border:    #2a2d3e;
      --accent:    #7c6af7;
      --accent-dim:#3d3580;
      --text:      #e2e4f0;
      --muted:     #6b7280;
      --green:     #34d399;
      --yellow:    #fbbf24;
      --red:       #f87171;
      --tool-bg:   #111827;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .logo { font-size: 18px; font-weight: 700; color: var(--accent); }
    .subtitle { color: var(--muted); font-size: 12px; }
    #tool-count-badge {
      background: var(--accent-dim);
      color: var(--accent);
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 99px;
      font-weight: 600;
    }
    #clear-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 5px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: border-color .15s, color .15s;
    }
    #clear-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Task type bar ── */
    #task-bar {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 6px 20px;
      background: var(--accent-dim);
      font-size: 12px;
      color: var(--accent);
      flex-shrink: 0;
    }
    #task-bar.visible { display: flex; }

    /* ── Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    #messages::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .msg { max-width: 820px; width: 100%; }
    .msg.user { align-self: flex-end; }
    .msg.agent { align-self: flex-start; }

    .bubble {
      padding: 12px 16px;
      border-radius: 10px;
      line-height: 1.65;
      white-space: pre-wrap;
    }
    .msg.user .bubble {
      background: var(--accent-dim);
      color: var(--text);
      border-bottom-right-radius: 2px;
    }
    .msg.agent .bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 2px;
    }

    /* Tool call chips */
    .tool-calls { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
    .tool-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--tool-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 3px 9px;
      font-size: 11px;
      color: var(--muted);
      font-family: monospace;
    }
    .tool-chip .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 1.2s ease infinite;
    }
    .tool-chip.done .dot { background: var(--green); animation: none; }
    @keyframes pulse {
      0%,100% { opacity:1; } 50% { opacity:.3; }
    }

    /* Thinking indicator */
    .thinking {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      padding: 8px 0;
    }
    .thinking-dots span {
      display: inline-block;
      width: 6px; height: 6px;
      background: var(--muted);
      border-radius: 50%;
      margin: 0 2px;
      animation: bounce 1.2s ease infinite;
    }
    .thinking-dots span:nth-child(2) { animation-delay: .2s; }
    .thinking-dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce {
      0%,80%,100% { transform:translateY(0); }
      40%          { transform:translateY(-6px); }
    }

    /* Code blocks inside markdown */
    .bubble code {
      background: var(--tool-bg);
      padding: 1px 5px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 12px;
    }
    .bubble pre {
      background: var(--tool-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px;
      overflow-x: auto;
      margin: 8px 0;
    }
    .bubble pre code { background: none; padding: 0; }

    /* ── Input area ── */
    #input-area {
      padding: 16px 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }
    #input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 10px 14px;
      font-size: 14px;
      resize: none;
      min-height: 42px;
      max-height: 140px;
      outline: none;
      transition: border-color .15s;
      font-family: inherit;
      line-height: 1.5;
    }
    #input:focus { border-color: var(--accent); }
    #input::placeholder { color: var(--muted); }
    #send-btn {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      padding: 10px 18px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: opacity .15s;
      flex-shrink: 0;
      height: 42px;
    }
    #send-btn:disabled { opacity: .4; cursor: default; }
    #send-btn:not(:disabled):hover { opacity: .85; }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--muted);
    }
    .empty-state .big { font-size: 40px; }
    .empty-state h2 { color: var(--text); font-size: 18px; }

    .examples {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 12px;
    }
    .example-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 12px;
      cursor: pointer;
      transition: border-color .15s;
      color: var(--text);
    }
    .example-chip:hover { border-color: var(--accent); color: var(--accent); }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <span class="logo">TIQ Agent</span>
    <span id="tool-count-badge">— tools</span>
    <span class="subtitle">Powered by Claude on AWS Bedrock</span>
  </div>
  <button id="clear-btn">Clear chat</button>
</header>

<div id="task-bar">
  <strong>Task type:</strong> <span id="task-label">—</span>
  <span style="color:var(--muted);font-size:11px">(locked for this conversation)</span>
</div>

<div id="messages">
  <div class="empty-state" id="empty-state">
    <div class="big">🤖</div>
    <h2>TIQ World AI Agent</h2>
    <p>Ask anything about the codebase — or try an example below.</p>
    <div class="examples">
      <span class="example-chip" data-q="Run a health check on the codebase">health check</span>
      <span class="example-chip" data-q="Explain route /api/auth/login">explain /api/auth/login</span>
      <span class="example-chip" data-q="Find all TODOs and FIXMEs in backend/src">find all TODOs</span>
      <span class="example-chip" data-q="Check env usage across the codebase">check env usage</span>
      <span class="example-chip" data-q="Detect dead code in backend/src">detect dead code</span>
      <span class="example-chip" data-q="Check CRUD completeness for the Track model">schema_to_api Track</span>
      <span class="example-chip" data-q="Show the last 10 git commits">git log</span>
    </div>
  </div>
</div>

<div id="input-area">
  <textarea id="input" placeholder="Ask about the TIQ codebase…" rows="1"></textarea>
  <button id="send-btn">Send</button>
</div>

<script>
const SESSION_ID = crypto.randomUUID();
let busy = false;

const messagesEl  = document.getElementById('messages');
const inputEl     = document.getElementById('input');
const sendBtn     = document.getElementById('send-btn');
const clearBtn    = document.getElementById('clear-btn');
const taskBar     = document.getElementById('task-bar');
const taskLabel   = document.getElementById('task-label');
const emptyState  = document.getElementById('empty-state');
const toolBadge   = document.getElementById('tool-count-badge');

// Fetch tool count on load
fetch('/api/status').then(r => r.json()).then(d => {
  toolBadge.textContent = `${d.tool_count} tools`;
});

// Auto-resize textarea
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
});

inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

sendBtn.addEventListener('click', send);

clearBtn.addEventListener('click', async () => {
  await fetch('/api/clear', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ sessionId: SESSION_ID }),
  });
  messagesEl.innerHTML = '';
  messagesEl.appendChild(emptyState);
  taskBar.classList.remove('visible');
  taskLabel.textContent = '—';
});

document.querySelectorAll('.example-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    inputEl.value = chip.dataset.q;
    send();
  });
});

function scrollBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addMsg(role, html, toolCalls = []) {
  if (emptyState.parentNode) emptyState.remove();

  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;

  if (toolCalls.length) {
    const chips = document.createElement('div');
    chips.className = 'tool-calls';
    toolCalls.forEach(t => chips.appendChild(t));
    wrap.appendChild(chips);
  }

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = html;
  wrap.appendChild(bubble);
  messagesEl.appendChild(wrap);
  scrollBottom();
  return wrap;
}

function makeToolChip(name) {
  const chip = document.createElement('span');
  chip.className = 'tool-chip';
  chip.innerHTML = `<span class="dot"></span>${name}`;
  return chip;
}

function renderMarkdown(text) {
  // Minimal markdown: code blocks, inline code, bold, headers, line breaks
  return text
    .replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
      `<pre><code>${escHtml(code.trim())}</code></pre>`)
    .replace(/`([^`]+)`/g, (_, c) => `<code>${escHtml(c)}</code>`)
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/^### (.+)$/gm, '<strong>$1</strong>')
    .replace(/^## (.+)$/gm,  '<strong>$1</strong>')
    .replace(/^# (.+)$/gm,   '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function send() {
  const q = inputEl.value.trim();
  if (!q || busy) return;
  busy = true;
  sendBtn.disabled = true;
  inputEl.value = '';
  inputEl.style.height = 'auto';

  addMsg('user', escHtml(q));

  // Thinking placeholder
  const thinkingEl = document.createElement('div');
  thinkingEl.className = 'msg agent';
  thinkingEl.innerHTML = `<div class="thinking">
    <div class="thinking-dots"><span></span><span></span><span></span></div>
    <span>Thinking…</span>
  </div>`;
  messagesEl.appendChild(thinkingEl);
  scrollBottom();

  const chips = [];
  let finalAnswer = '';

  const url = `/api/chat?q=${encodeURIComponent(q)}&sessionId=${SESSION_ID}`;
  const es  = new EventSource(url);

  es.onmessage = (e) => {
    if (e.data === '[DONE]') {
      es.close();
      thinkingEl.remove();

      chips.forEach(c => c.dot?.classList.add('done'));

      addMsg('agent', renderMarkdown(finalAnswer || 'No response.'), chips);

      busy = false;
      sendBtn.disabled = false;
      inputEl.focus();
      return;
    }

    let evt;
    try { evt = JSON.parse(e.data); } catch { return; }

    if (evt.type === 'task_type') {
      taskLabel.textContent = evt.label;
      taskBar.classList.add('visible');
    }

    if (evt.type === 'tool_call') {
      const chip = makeToolChip(evt.name);
      chips.push(chip);
      // Append chips area before the thinking dots
      let chipsArea = thinkingEl.querySelector('.tool-calls');
      if (!chipsArea) {
        chipsArea = document.createElement('div');
        chipsArea.className = 'tool-calls';
        thinkingEl.insertBefore(chipsArea, thinkingEl.firstChild);
      }
      chipsArea.appendChild(chip);
      scrollBottom();
    }

    if (evt.type === 'answer') {
      finalAnswer = evt.text;
    }

    if (evt.type === 'error') {
      thinkingEl.remove();
      addMsg('agent', `<span style="color:var(--red)">Error: ${escHtml(evt.message)}</span>`);
      busy = false;
      sendBtn.disabled = false;
    }
  };

  es.onerror = () => {
    es.close();
    thinkingEl.remove();
    addMsg('agent', '<span style="color:var(--red)">Connection error — is the server running?</span>');
    busy = false;
    sendBtn.disabled = false;
  };
}
</script>
</body>
</html>
